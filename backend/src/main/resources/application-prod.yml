# Perfil: produção
# Ativado quando SPRING_PROFILES_ACTIVE=prod (configurar no Render/servidor).
# Nenhum valor padrão — todas as variáveis de ambiente devem ser definidas explicitamente.
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

sankhya:
  login-url: ${SANKHYA_LOGIN_URL}
  service-url: ${SANKHYA_SERVICE_URL}
  auth-enabled: ${SANKHYA_AUTH_ENABLED:true}
  username: ${SANKHYA_USERNAME}
  password: ${SANKHYA_PASSWORD}
  connect-timeout-ms: ${SANKHYA_CONNECT_TIMEOUT_MS:10000}
  read-timeout-ms: ${SANKHYA_READ_TIMEOUT_MS:60000}

app:
  frontend-url: ${FRONTEND_URL}
  mail:
    from: ${MAIL_FROM}
