# Configurações base — compartilhadas por todos os perfis.
# Perfil ativo: defina SPRING_PROFILES_ACTIVE=dev (padrão) ou prod.
spring:
  application:
    name: cobranca-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  expiration: ${JWT_EXPIRATION:86400000} # 24 horas em milissegundos

server:
  port: 8080
  servlet:
    context-path: /api
