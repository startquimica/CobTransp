  read-timeout-ms: ${SANKHYA_READ_TIMEOUT_MS:60000}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:noreply@startquimica.com.br}
