  service-url: ${SANKHYA_SERVICE_URL:http://n-ti-daniel2:8080/startquimica/service.sbr?serviceName=ImportacaoEDIFreteSP.integrarDocTransp&outputType=json}
  auth-enabled: ${SANKHYA_AUTH_ENABLED:true}
  username: ${SANKHYA_USERNAME:daniel}
