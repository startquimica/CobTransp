spring:
  application:
    name: cobranca-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cobranca}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:aW1wb3NzaWJsZVRvR3Vlc3NTZWNyZXRLZXlXaGljaElzQXRMZWFzdDI1NkJpdHNMZW5ndGg=}
  expiration: ${JWT_EXPIRATION:86400000} # 24 horas em milissegundos

server:
  port: 8080
  servlet:
    context-path: /api

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174}

sankhya:
